name: Makefile CI (Firmware Build)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: a1-sdk-builder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 构建 Docker 构建环境镜像（与 docker-image.yml 完全一致，带 GHA 缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build builder Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          load: true
          tags: temp-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # 在容器内执行 build.sh（挂载整个仓库，模拟 README 流程）
      - name: Build firmware with build.sh
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            --workdir /app/src \
            temp-builder:latest \
            ./scripts/build.sh --cmake --type release -j 4

      # 上传二进制 artifact（PR 和 push 都可用）
      - name: Upload vision_system binary
        uses: actions/upload-artifact@v4
        with:
          name: vision-system-binary
          path: src/build_cmake/vision_system
          retention-days: 7
          if-no-files-found: error

      # 可选：显示构建信息
      - name: Show build info
        run: |
          echo "✅ Build completed!"
          ls -lh src/build_cmake/vision_system 2>/dev/null || echo "Binary not found (check logs)"
